  <pre id="diag" style="position:fixed;top:0;left:0;z-index:99999;background:#fff;color:#000;font:12px monospace;margin:0">pending</pre>
  <script>
    let lastError = null;
    window.addEventListener('error', (e) => { lastError = String(e.message); });
    const slug = new URLSearchParams(location.search).get('slug') || '4 binary';
    const obs = new MutationObserver(() => {
      const p = document.querySelector('.panel');
      if (p) {
        obs.disconnect();
        const target = document.querySelector('.panel[data-slug="' + slug + '"]') || p;
        const mode = new URLSearchParams(location.search).get('mode') || 'full';
        let threw = null, measuredH = null;
        try {
          if (mode === 'addonly') {
            target.classList.add('panel--expanded');
            target.setAttribute('aria-expanded', 'true');
          } else if (mode === 'measure') {
            measuredH = measureExpandedHeight(target);
            target.classList.add('panel--expanded');
            target.setAttribute('aria-expanded', 'true');
          } else {
            expandPanel(target);
          }
        } catch (err) { threw = String(err); }
        setTimeout(() => {
          const r = target.getBoundingClientRect();
          const content = target.querySelector('.panel__expanded-content');
          const vh = window.innerHeight;
          const out = {
            vh,
            mode,
            measuredH,
            scrollY: Math.round(window.scrollY),
            cls: target.className,
            gtr: getComputedStyle(content).gridTemplateRows,
            threw,
            lastError,
            rectTop: Math.round(r.top),
            rectBottom: Math.round(r.bottom),
            panelH: Math.round(r.height),
            gapTop: Math.round(r.top),
            gapBottom: Math.round(vh - r.bottom),
            fitsInView: r.height <= vh - 24,
          };
          document.getElementById('diag').textContent = 'DIAG:' + JSON.stringify(out);
        }, 1800);
      }
    });
    obs.observe(document.getElementById('grid'), { childList: true });
  </script>
