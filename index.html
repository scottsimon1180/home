<!DOCTYPE html>

  <meta charset="UTF-8">

  <!-- Apply the saved/preferred theme before first paint so there's no flash of
       the wrong theme. Mirrored by initTheme() in js/script.js. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
